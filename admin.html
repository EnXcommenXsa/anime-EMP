<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة الإمبراطورية | سري</title>
    <style>
        :root { 
            --bg-dark: #19171b; 
            --surface: #252628; 
            --primary: #5d0018; 
            --gold: #d29f22; 
            --text: #f2f2f2; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-dark); color: var(--text); margin: 0; padding: 0; padding-bottom: 80px; }
        
        .header { background: #0a080c; padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 10; }
        .header h2 { margin: 0; color: var(--gold); font-size: 22px; letter-spacing: 1px; }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        
        /* شاشة تسجيل الدخول */
        #login-section { display: block; background: var(--surface); padding: 30px; border-radius: 12px; border: 1px solid var(--primary); margin-top: 50px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #dashboard-section { display: none; } /* يظهر فقط بعد الدخول */

        .form-section { display: none; background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: fadeIn 0.3s ease; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin: 15px 0 8px; color: #bbb; font-size: 14px; font-weight: bold; text-align: right; }
        input { width: 100%; box-sizing: border-box; padding: 14px; background: var(--bg-dark); border: 1px solid #444; color: white; border-radius: 8px; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: inset 0 0 8px rgba(210, 159, 34, 0.3); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .search-container { position: relative; }
        .search-results { position: absolute; width: 100%; background: var(--bg-dark); border: 1px solid var(--gold); border-top: none; border-radius: 0 0 8px 8px; max-height: 150px; overflow-y: auto; z-index: 20; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .search-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; color: white; font-size: 14px; transition: 0.2s; text-align: right; }
        .search-item:hover { background: var(--primary); color: var(--gold); }

        .submit-btn { width: 100%; padding: 15px; margin-top: 25px; color: var(--gold); background: var(--primary); border: 1px solid var(--primary); border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-red { background: linear-gradient(45deg, #5d0018, #8b0024); color: white; }
        .btn-green { background: linear-gradient(45deg, #1e7e34, #28a745); color: white; border-color: #1e7e34; }
        .btn-dark { background: linear-gradient(45deg, #222, #444); border: 1px solid #555; color: white; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a080c; display: flex; border-top: 1px solid #333; z-index: 100; padding-bottom: env(safe-area-inset-bottom); display: none; }
        .nav-item { flex: 1; padding: 18px 5px; text-align: center; color: #888; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); background: rgba(93, 0, 24, 0.3); border-top: 2px solid var(--gold); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-box { background: var(--surface); width: 85%; max-width: 400px; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.8); animation: popIn 0.3s; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-box h3 { margin-top: 0; color: var(--gold); }
        .modal-box p { color: #ccc; font-size: 15px; line-height: 1.5; margin-bottom: 25px; white-space: pre-line;}
        .modal-btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 0 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--bg-dark); border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #333; }
        th { background: var(--primary); color: var(--gold); }
        .user-row { cursor: pointer; transition: 0.2s; }
        .user-row:hover { background: #1a1a1a; }
        .ledger-modal .modal-box { max-width: 500px; width: 95%; padding: 15px; text-align: right; }
        .ledger-table { font-size: 12px; }
    </style>
</head>
<body>

    <div class="header"><h2>إدارة الإمبراطورية</h2></div>

    <div class="container">
        
        <!-- شاشة تسجيل الدخول الآمنة -->
        <div id="login-section">
            <h3 style="color:var(--gold); margin-top:0;">تسجيل دخول المشرفين</h3>
            <p style="color:#888; font-size:13px; margin-bottom:20px;">الرجاء إدخال بيانات المصادقة</p>
            <input type="email" id="authEmail" placeholder="البريد الإلكتروني..." autocomplete="off">
            <input type="password" id="authPass" placeholder="كلمة المرور..." style="margin-top:15px;">
            <input type="text" id="adminName" placeholder="اكتب اسمك الحقيقي (للسجل)" style="margin-top:15px;">
            <button class="submit-btn" onclick="loginAdmin()">تسجيل الدخول</button>
        </div>

        <!-- اللوحة الرئيسية (مخفية حتى يتم الدخول) -->
        <div id="dashboard-section">
            
            <!-- 1. إضافة عضو -->
            <div id="tab-add" class="form-section active">
                <h3 style="color:var(--gold); text-align:center; margin-top:0;">إضافة عضو جديد</h3>
                <label>رابط الحساب:</label>
                <input type="text" id="newLink" placeholder="ألصق رابط العضو..." autocomplete="off">
                <label>لقب العضو:</label>
                <input type="text" id="newName" placeholder="اكتب اللقب..." autocomplete="off">
                <button class="submit-btn btn-green" onclick="addUser()">إضافة العضو للقاعدة</button>
            </div>

            <!-- 2. العملات (مدمجة) -->
            <div id="tab-coins" class="form-section">
                <h3 style="color:var(--gold); text-align:center; margin-top:0;">العملات (إضافة / خصم)</h3>
                
                <div class="search-container">
                    <label>ابحث عن العضو:</label>
                    <input type="text" id="coinSearch" placeholder="اكتب حرفين من اللقب..." autocomplete="off" oninput="handleSearch(this.value, 'coinResults', 'coin')">
                    <div id="coinResults" class="search-results"></div>
                </div>
                <input type="hidden" id="coinUserId">

                <label>عدد العملات (بدون إشارة السالب):</label>
                <input type="number" id="coinAmount" placeholder="مثال: 50">
                
                <label>السبب والتفاصيل (للسجل):</label>
                <input type="text" id="coinReason" placeholder="مثال: مسابقة، عقوبة، شراء..." autocomplete="off">
                
                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button class="submit-btn btn-green" style="margin-top:0;" onclick="processCoins('add')">إضافة رصيد</button>
                    <button class="submit-btn btn-red" style="margin-top:0;" onclick="processCoins('deduct')">خصم رصيد</button>
                </div>
            </div>

            <!-- 3. إزالة عضو -->
            <div id="tab-del" class="form-section">
                <h3 style="color:var(--primary); text-align:center; margin-top:0;">إزالة عضو نهائياً</h3>
                <div class="search-container">
                    <label>ابحث عن العضو للحذف:</label>
                    <input type="text" id="delSearch" placeholder="اكتب اللقب..." autocomplete="off" oninput="handleSearch(this.value, 'delResults', 'del')">
                    <div id="delResults" class="search-results"></div>
                </div>
                <input type="hidden" id="delUserId">
                <button class="submit-btn btn-dark" onclick="confirmDelete()">حذف ونقل للمحذوفين</button>
            </div>

            <!-- 4. القائمة -->
            <div id="tab-list" class="form-section">
                <h3 style="color:var(--gold); text-align:center; margin-top:0;">جميع الأعضاء</h3>
                <p style="text-align:center; color:#888; font-size:12px;">انقر على أي عضو لعرض سجله</p>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table>
                        <thead><tr><th>اللقب</th><th>الرصيد</th></tr></thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item active" onclick="switchTab('tab-add', this)">إضافة</div>
        <div class="nav-item" onclick="switchTab('tab-coins', this)">العملات</div>
        <div class="nav-item" onclick="switchTab('tab-del', this)">إزالة</div>
        <div class="nav-item" onclick="switchTab('tab-list', this)">القائمة</div>
    </div>

    <!-- النوافذ المنبثقة -->
    <div id="msgModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="msgTitle">رسالة</h3>
            <p id="msgText"></p>
            <button class="modal-btn btn-red" style="color:white;" onclick="document.getElementById('msgModal').style.display='none'">حسناً</button>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box">
            <h3>تأكيد الحذف</h3>
            <p id="confirmText"></p>
            <button class="modal-btn btn-dark" onclick="document.getElementById('confirmModal').style.display='none'">إلغاء</button>
            <button class="modal-btn btn-red" style="color:white;" onclick="executeDelete()">نعم، احذف</button>
        </div>
    </div>

    <div id="ledgerModal" class="modal-overlay ledger-modal">
        <div class="modal-box">
            <h3 id="ledgerTitle" style="color:var(--gold); text-align:center; margin-top:0;">سجل العضو</h3>
            <div style="max-height: 300px; overflow-y: auto;">
                <table class="ledger-table">
                    <thead><tr><th>التاريخ</th><th>المبلغ</th><th>السبب</th><th>المسؤول</th></tr></thead>
                    <tbody id="ledgerBody"></tbody>
                </table>
            </div>
            <button class="submit-btn btn-dark" style="margin-top:15px; padding:10px;" onclick="document.getElementById('ledgerModal').style.display='none'">إغلاق</button>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const API_KEY = "AIzaSyBDORLuYRFJdIC8SxLyoUV42JSsfMQixEs";
        const DB_URL = "https://anime-empire-55fc0-default-rtdb.europe-west1.firebasedatabase.app";
        
        let authToken = null; 
        let globalUsers = {}; 

        function showMsg(title, text) {
            document.getElementById('msgTitle').innerText = title;
            document.getElementById('msgText').innerText = text;
            document.getElementById('msgModal').style.display = 'flex';
        }

        // 1. نظام تسجيل الدخول الآمن
        async function loginAdmin() {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value;
            const name = document.getElementById('adminName').value.trim();

            if(!email || !pass || !name) return showMsg("تنبيه", "يجب إكمال البريد، كلمة المرور، واسمك!");

            showMsg("انتظر", "جاري التحقق من الهوية...");
            
            try {
                // الاتصال بخوادم مصادقة جوجل
                const authRes = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email, password: pass, returnSecureToken: true })
                });
                
                const authData = await authRes.json();
                
                if(!authRes.ok) throw new Error(authData.error.message);
                
                // حفظ التصريح السري
                authToken = authData.idToken;
                sessionStorage.setItem('adminName', name);

                document.getElementById('msgModal').style.display='none';
                document.getElementById('login-section').style.display='none';
                document.getElementById('dashboard-section').style.display='block';
                document.getElementById('bottomNav').style.display='flex';
                
                await fetchUsers();
            } catch (e) {
                showMsg("مرفوض", "بيانات الدخول خاطئة أو حساب الإدارة غير موجود.");
            }
        }

        // جلب الأعضاء (يستخدم التصريح)
        async function fetchUsers() {
            if(!authToken) return;
            try {
                // إضافة ?auth= للتصريح بالدخول للقاعدة
                let res = await fetch(`${DB_URL}/users.json?auth=${authToken}`);
                let data = await res.json() || {};
                globalUsers = {};
                Object.entries(data).forEach(([id, user]) => {
                    if (user && user.name) globalUsers[id] = user;
                });
                if(document.getElementById('tab-list').classList.contains('active')) loadUsersTable();
            } catch (e) { showMsg("خطأ", "فشل جلب البيانات."); }
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            
            if(tabId === 'tab-list') loadUsersTable();
        }

        function handleSearch(query, resultBoxId, type) {
            const box = document.getElementById(resultBoxId);
            box.innerHTML = '';
            if(query.trim().length < 2) { box.style.display = 'none'; return; }
            
            let matches = Object.entries(globalUsers).filter(([id, user]) => 
                user.name.toLowerCase().includes(query.toLowerCase()) || 
                user.link.toLowerCase().includes(query.toLowerCase())
            );

            if(matches.length === 0) { box.style.display = 'none'; return; }

            matches.forEach(([id, user]) => {
                let div = document.createElement('div');
                div.className = 'search-item';
                div.innerText = `${user.name} (${user.balance})`;
                div.onclick = () => {
                    document.getElementById(type + 'Search').value = user.name;
                    document.getElementById(type + 'UserId').value = id;
                    box.style.display = 'none';
                };
                box.appendChild(div);
            });
            box.style.display = 'block';
        }

        async function addUser() {
            if(!authToken) return;
            const link = document.getElementById('newLink').value.trim();
            const name = document.getElementById('newName').value.trim();
            const admin = sessionStorage.getItem('adminName');
            
            if(!link || !name) return showMsg("تنبيه", "يجب إكمال رابط الحساب ولقب العضو معاً!");

            let exists = Object.values(globalUsers).find(u => u.link === link || u.name === name);
            if(exists) return showMsg("مرفوض", "لا يمكن الإضافة! هذا اللقب أو الرابط مستخدم بالفعل.");

            try {
                await fetch(`${DB_URL}/users.json?auth=${authToken}`, { method: 'POST', body: JSON.stringify({ link: link, name: name, balance: 0 }) });
                
                let dateStr = new Date().toLocaleDateString('en-GB');
                await fetch(`${DB_URL}/ledger.json?auth=${authToken}`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: name, amount: 0, note: "تسجيل عضو جديد", admin: admin }) });
                
                showMsg("تم بنجاح", `تمت إضافة العضو [ ${name} ] بنجاح.`);
                document.getElementById('newLink').value = ''; document.getElementById('newName').value = '';
                await fetchUsers(); 
            } catch(e) { showMsg("خطأ", "فشل الحفظ."); }
        }

        async function processCoins(type) {
            if(!authToken) return;
            const userId = document.getElementById('coinUserId').value;
            const amountStr = document.getElementById('coinAmount').value;
            const reason = document.getElementById('coinReason').value.trim();
            const admin = sessionStorage.getItem('adminName');
            
            if(!userId || !globalUsers[userId]) return showMsg("تنبيه", "يجب اختيار عضو من قائمة البحث أولاً!");
            if(!amountStr || !reason) return showMsg("تنبيه", "يجب كتابة العدد وسبب العملية!");
            
            let amount = Number(amountStr);
            if(amount === 0) return showMsg("تنبيه", "لا يمكن إضافة أو خصم 0 عملات!");
            
            amount = Math.abs(amount); 
            if(type === 'deduct') amount = -amount; 

            let newBalance = Number(globalUsers[userId].balance) + amount;

            try {
                await fetch(`${DB_URL}/users/${userId}.json?auth=${authToken}`, { method: 'PATCH', body: JSON.stringify({ balance: newBalance }) });
                
                let dateStr = new Date().toLocaleDateString('en-GB');
                await fetch(`${DB_URL}/ledger.json?auth=${authToken}`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: globalUsers[userId].name, amount: amount, note: reason, admin: admin }) });
                
                showMsg("تم بنجاح", `تم التحديث! الرصيد الجديد: ${newBalance}`);
                document.getElementById('coinSearch').value = ''; document.getElementById('coinAmount').value = ''; document.getElementById('coinReason').value = '';
                await fetchUsers();
            } catch(e) { showMsg("خطأ", "فشل التحديث."); }
        }

        function confirmDelete() {
            const userId = document.getElementById('delUserId').value;
            if(!userId || !globalUsers[userId]) return showMsg("تنبيه", "يجب البحث عن العضو واختياره أولاً!");

            const user = globalUsers[userId];
            document.getElementById('confirmText').innerText = `أنت على وشك حذف العضو:\n[ ${user.name} ]\nرصيده الحالي: ${user.balance} عملة.\n\nهل أنت متأكد؟`;
            document.getElementById('confirmModal').style.display = 'flex';
        }

        async function executeDelete() {
            if(!authToken) return;
            const userId = document.getElementById('delUserId').value;
            const admin = sessionStorage.getItem('adminName');
            const user = globalUsers[userId];
            document.getElementById('confirmModal').style.display = 'none';

            let dateStr = new Date().toLocaleDateString('en-GB');

            try {
                await fetch(`${DB_URL}/deleted.json?auth=${authToken}`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: user.name, link: user.link, admin: admin }) });
                await fetch(`${DB_URL}/users/${userId}.json?auth=${authToken}`, { method: 'DELETE' });
                
                showMsg("تم الحذف", `تمت إزالة العضو نهائياً.`);
                document.getElementById('delSearch').value = '';
                await fetchUsers();
            } catch(e) { showMsg("خطأ", "فشل الحذف"); }
        }

        function loadUsersTable() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            let usersArray = Object.values(globalUsers).sort((a,b) => b.balance - a.balance);
            if(usersArray.length === 0) { tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;">لا يوجد أعضاء</td></tr>'; return;}
            usersArray.forEach(user => {
                tbody.innerHTML += `<tr class="user-row" onclick="openLedger('${user.name}')"><td>${user.name}</td><td style="color:var(--gold); font-weight:bold;">${user.balance}</td></tr>`;
            });
        }

        async function openLedger(userName) {
            document.getElementById('ledgerTitle').innerText = 'سجل: ' + userName;
            const tbody = document.getElementById('ledgerBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">جاري جلب السجل...</td></tr>';
            document.getElementById('ledgerModal').style.display = 'flex';

            try {
                const res = await fetch(`${DB_URL}/ledger.json?auth=${authToken}`);
                const data = await res.json();
                tbody.innerHTML = '';
                
                if(!data) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد سجل لهذا العضو.</td></tr>'; return; }
                
                const history = Object.values(data).filter(item => item.name === userName);
                if(history.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد سجل لهذا العضو.</td></tr>'; return; }
                
                history.reverse().forEach(item => {
                    let amountStr = Number(item.amount);
                    let color = amountStr > 0 ? '#28a745' : (amountStr < 0 ? '#e60000' : '#888');
                    tbody.innerHTML += `<tr>
                        <td style="color:#aaa;">${item.date}</td>
                        <td style="color:${color}; direction:ltr; font-weight:bold;">${amountStr}</td>
                        <td>${item.note}</td>
                        <td style="color:#bbb;">${item.admin}</td>
                    </tr>`;
                });
            } catch(e) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">خطأ في جلب السجل.</td></tr>'; }
        }
    </script>
</body>
</html>
