<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة الإمبراطورية | سري</title>
    <style>
        :root { 
            --bg-dark: #19171b; 
            --surface: #252628; 
            --primary: #5d0018; 
            --gold: #d29f22; 
            --text: #f2f2f2; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-dark); color: var(--text); margin: 0; padding: 0; padding-bottom: 80px; }
        
        .header { background: var(--primary); padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 10; }
        .header h2 { margin: 0; color: var(--gold); font-size: 22px; letter-spacing: 1px; }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .form-section { display: none; background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: fadeIn 0.3s ease; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin: 15px 0 8px; color: var(--gold); font-size: 14px; font-weight: bold; }
        input { width: 100%; box-sizing: border-box; padding: 14px; background: var(--bg-dark); border: 1px solid #444; color: white; border-radius: 8px; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 8px rgba(210, 159, 34, 0.3); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* البحث الحي */
        .search-container { position: relative; }
        .search-results { position: absolute; width: 100%; background: var(--bg-dark); border: 1px solid var(--gold); border-top: none; border-radius: 0 0 8px 8px; max-height: 150px; overflow-y: auto; z-index: 20; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .search-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; color: white; font-size: 14px; transition: 0.2s; }
        .search-item:hover { background: var(--primary); color: var(--gold); }

        .submit-btn { width: 100%; padding: 15px; margin-top: 25px; background: var(--primary); color: var(--gold); border: 1px solid var(--gold); border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .submit-btn:active { transform: scale(0.98); background: #3a000f; }
        .btn-green { background: #1e7e34; border-color: #28a745; color: white; }

        /* شريط التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; border-top: 2px solid var(--gold); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 12px 2px; text-align: center; color: #888; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--gold); background: rgba(93, 0, 24, 0.3); }
        .nav-icon { font-size: 18px; }

        /* النوافذ المنبثقة (Modals) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-box { background: var(--surface); width: 85%; max-width: 400px; padding: 25px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.9); animation: popIn 0.3s; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-box h3 { margin-top: 0; color: var(--gold); }
        .modal-box p { color: #ccc; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 0 5px; }
        .btn-confirm { background: var(--primary); color: var(--gold); border: 1px solid var(--gold); }
        .btn-cancel { background: #333; color: white; }

        /* جدول الأعضاء والسجل */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--bg-dark); border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #333; }
        th { background: var(--primary); color: var(--gold); }
        .user-row { cursor: pointer; transition: 0.2s; }
        .user-row:hover { background: #1a1a1a; }
        .ledger-modal .modal-box { max-width: 500px; width: 95%; padding: 15px; text-align: right; }
        .ledger-table { font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>♛ الخزينة الإمبراطورية ♛</h2>
    </div>

    <div class="container">
        <!-- بيانات المسؤول -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <label>🔑 الرمز السري:</label>
                <input type="password" id="adminPass" placeholder="الرمز...">
            </div>
            <div style="flex: 1;">
                <label>👤 اسمك (للسجل):</label>
                <input type="text" id="adminName" placeholder="اكتب اسمك...">
            </div>
        </div>

        <!-- 1. إضافة عضو -->
        <div id="tab-add" class="form-section active">
            <h3 style="color:var(--gold); text-align:center; margin-top:0;">إضافة عضو جديد</h3>
            <label>رابط الحساب:</label>
            <input type="text" id="newLink" placeholder="ألصق رابط العضو..." autocomplete="off">
            <label>لقب العضو:</label>
            <input type="text" id="newName" placeholder="اكتب اللقب..." autocomplete="off">
            <button class="submit-btn btn-green" onclick="addUser()">+ حفظ العضو</button>
        </div>

        <!-- 2. إضافة عملات -->
        <div id="tab-add-coins" class="form-section">
            <h3 style="color:var(--gold); text-align:center; margin-top:0;">إضافة عملات</h3>
            <div class="search-container">
                <label>ابحث عن العضو:</label>
                <input type="text" id="addSearch" placeholder="اكتب اللقب..." autocomplete="off" oninput="handleSearch(this.value, 'addResults', 'add')">
                <div id="addResults" class="search-results"></div>
            </div>
            <input type="hidden" id="addUserId">
            <label>العدد المضاف:</label>
            <input type="number" id="addAmount" placeholder="مثال: 50">
            <label>سبب الإضافة:</label>
            <input type="text" id="addReason" placeholder="مثال: مدونة، مسابقة...">
            <button class="submit-btn btn-green" onclick="processCoins('add')">+ إضافة الرصيد</button>
        </div>

        <!-- 3. خصم عملات -->
        <div id="tab-deduct-coins" class="form-section">
            <h3 style="color:var(--primary); text-align:center; margin-top:0;">خصم عملات</h3>
            <div class="search-container">
                <label>ابحث عن العضو:</label>
                <input type="text" id="deductSearch" placeholder="اكتب اللقب..." autocomplete="off" oninput="handleSearch(this.value, 'deductResults', 'deduct')">
                <div id="deductResults" class="search-results"></div>
            </div>
            <input type="hidden" id="deductUserId">
            <label>العدد المخصوم:</label>
            <input type="number" id="deductAmount" placeholder="مثال: 50">
            <label>نوع الخصم وتفاصيله:</label>
            <input type="text" id="deductReason" placeholder="مثال: عقوبة، إجازة، متجر...">
            <button class="submit-btn" onclick="processCoins('deduct')">- خصم الرصيد</button>
        </div>

        <!-- 4. إزالة عضو -->
        <div id="tab-del" class="form-section">
            <h3 style="color:var(--primary); text-align:center; margin-top:0;">⚠️ إزالة عضو</h3>
            <div class="search-container">
                <label>ابحث عن العضو للحذف:</label>
                <input type="text" id="delSearch" placeholder="اكتب اللقب..." autocomplete="off" oninput="handleSearch(this.value, 'delResults', 'del')">
                <div id="delResults" class="search-results"></div>
            </div>
            <input type="hidden" id="delUserId">
            <button class="submit-btn" style="background:#333; color:white; border-color:#555;" onclick="confirmDelete()">إزالة ونقل لسجل المحذوفين</button>
        </div>

        <!-- 5. قائمة الأعضاء -->
        <div id="tab-list" class="form-section">
            <h3 style="color:var(--gold); text-align:center; margin-top:0;">جميع الأعضاء</h3>
            <p style="text-align:center; color:#888; font-size:12px;">انقر على أي عضو لفتح السجل الخاص به</p>
            <div style="max-height: 400px; overflow-y: auto;">
                <table>
                    <thead><tr><th>اللقب</th><th>الرصيد</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tab-add', this)"><span class="nav-icon">➕</span>عضو</div>
        <div class="nav-item" onclick="switchTab('tab-add-coins', this)"><span class="nav-icon">📈</span>إضافة</div>
        <div class="nav-item" onclick="switchTab('tab-deduct-coins', this)"><span class="nav-icon">📉</span>خصم</div>
        <div class="nav-item" onclick="switchTab('tab-del', this)"><span class="nav-icon">🗑️</span>حذف</div>
        <div class="nav-item" onclick="switchTab('tab-list', this); loadUsersTable();"><span class="nav-icon">📋</span>الكل</div>
    </div>

    <!-- النوافذ المنبثقة -->
    <div id="msgModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="msgTitle">رسالة</h3>
            <p id="msgText">نص الرسالة</p>
            <button class="modal-btn btn-confirm" onclick="document.getElementById('msgModal').style.display='none'">حسناً</button>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box">
            <h3>⚠️ تأكيد الحذف</h3>
            <p id="confirmText">هل أنت متأكد؟</p>
            <button class="modal-btn btn-cancel" onclick="document.getElementById('confirmModal').style.display='none'">إلغاء</button>
            <button class="modal-btn btn-confirm" onclick="executeDelete()">نعم، احذف العضو</button>
        </div>
    </div>

    <!-- نافذة السجل -->
    <div id="ledgerModal" class="modal-overlay ledger-modal">
        <div class="modal-box">
            <h3 id="ledgerTitle" style="color:var(--gold); text-align:center; margin-top:0;">سجل العضو</h3>
            <div style="max-height: 300px; overflow-y: auto;">
                <table class="ledger-table">
                    <thead><tr><th>التاريخ</th><th>المبلغ</th><th>السبب</th><th>المسؤول</th></tr></thead>
                    <tbody id="ledgerBody"></tbody>
                </table>
            </div>
            <button class="submit-btn btn-cancel" style="margin-top:15px; padding:10px;" onclick="document.getElementById('ledgerModal').style.display='none'">إغلاق السجل</button>
        </div>
    </div>

    <script>
        // رابط Firebase الخاص بك
        const FB_URL = "https://anime-empire-55fc0-default-rtdb.firebaseio.com";
        let globalUsers = {}; 

        function showMsg(title, text, color = "var(--gold)") {
            document.getElementById('msgTitle').innerText = title;
            document.getElementById('msgTitle').style.color = color;
            document.getElementById('msgText').innerText = text;
            document.getElementById('msgModal').style.display = 'flex';
        }

        async function fetchUsers() {
            try {
                const res = await fetch(`${FB_URL}/users.json`);
                globalUsers = await res.json() || {};
            } catch (e) { showMsg("خطأ", "فشل الاتصال بقاعدة البيانات", "var(--primary)"); }
        }
        
        window.onload = fetchUsers;

        function switchTab(tabId, el) {
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            fetchUsers(); 
        }

        function handleSearch(query, resultBoxId, type) {
            const box = document.getElementById(resultBoxId);
            box.innerHTML = '';
            if(query.length < 2) { box.style.display = 'none'; return; }
            
            let matches = Object.entries(globalUsers).filter(([id, user]) => 
                user.name.toLowerCase().includes(query.toLowerCase()) || 
                user.link.toLowerCase().includes(query.toLowerCase())
            );

            if(matches.length === 0) { box.style.display = 'none'; return; }

            matches.forEach(([id, user]) => {
                let div = document.createElement('div');
                div.className = 'search-item';
                div.innerText = `${user.name} (${user.balance} عملة)`;
                div.onclick = () => {
                    document.getElementById(type + 'Search').value = user.name;
                    document.getElementById(type + 'UserId').value = id;
                    box.style.display = 'none';
                };
                box.appendChild(div);
            });
            box.style.display = 'block';
        }

        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            const name = document.getElementById('adminName').value;
            if(pass !== "123" || !name) { showMsg("تنبيه", "يجب كتابة الرمز السري (123) واسمك!", "var(--primary)"); return null; }
            return name;
        }

        async function addUser() {
            const admin = checkAdmin(); if(!admin) return;
            const link = document.getElementById('newLink').value.trim();
            const name = document.getElementById('newName').value.trim();
            if(!link || !name) return showMsg("تنبيه", "أكمل جميع الحقول!");

            let exists = Object.values(globalUsers).find(u => u.link === link || u.name === name);
            if(exists) return showMsg("مرفوض", "هذا العضو أو الرابط مسجل مسبقاً!", "var(--primary)");

            try {
                await fetch(`${FB_URL}/users.json`, { method: 'POST', body: JSON.stringify({ link: link, name: name, balance: 0 }) });
                
                let dateStr = new Date().toLocaleDateString('en-GB');
                await fetch(`${FB_URL}/ledger.json`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: name, amount: 0, note: "تسجيل عضو جديد", admin: admin }) });

                showMsg("نجاح", `تمت إضافة العضو ${name} بنجاح!`);
                document.getElementById('newLink').value = ''; document.getElementById('newName').value = '';
                fetchUsers();
            } catch(e) { showMsg("خطأ", "فشل الحفظ"); }
        }

        async function processCoins(type) {
            const admin = checkAdmin(); if(!admin) return;
            const userId = document.getElementById(type + 'UserId').value;
            const amountStr = document.getElementById(type + 'Amount').value;
            const reason = document.getElementById(type + 'Reason').value.trim();
            
            if(!userId || !globalUsers[userId]) return showMsg("تنبيه", "الرجاء اختيار عضو من قائمة البحث!");
            if(!amountStr || !reason) return showMsg("تنبيه", "جميع الحقول إجبارية!");
            
            let amount = Number(amountStr);
            if(amount === 0) return showMsg("تنبيه", "لا يمكن إضافة أو خصم 0 عملات!", "var(--primary)");
            
            amount = Math.abs(amount); 
            if(type === 'deduct') amount = -amount; 

            let newBalance = Number(globalUsers[userId].balance) + amount;
            let dateStr = new Date().toLocaleDateString('en-GB');

            try {
                await fetch(`${FB_URL}/users/${userId}.json`, { method: 'PATCH', body: JSON.stringify({ balance: newBalance }) });
                await fetch(`${FB_URL}/ledger.json`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: globalUsers[userId].name, amount: amount, note: reason, admin: admin }) });
                
                showMsg("نجاح", `تم التحديث! الرصيد الجديد: ${newBalance}`);
                document.getElementById(type + 'Search').value = ''; document.getElementById(type + 'Amount').value = ''; document.getElementById(type + 'Reason').value = '';
                fetchUsers();
            } catch(e) { showMsg("خطأ", "فشل التحديث"); }
        }

        function confirmDelete() {
            const admin = checkAdmin(); if(!admin) return;
            const userId = document.getElementById('delUserId').value;
            if(!userId || !globalUsers[userId]) return showMsg("تنبيه", "الرجاء اختيار العضو من البحث أولاً!");

            const user = globalUsers[userId];
            document.getElementById('confirmText').innerText = `أنت على وشك حذف العضو [ ${user.name} ]\nهذا العضو يمتلك [ ${user.balance} ] عملة.\n\nهل أنت متأكد من نقله لسجل المحذوفين؟`;
            document.getElementById('confirmModal').style.display = 'flex';
        }

        async function executeDelete() {
            const userId = document.getElementById('delUserId').value;
            const admin = document.getElementById('adminName').value;
            const user = globalUsers[userId];
            document.getElementById('confirmModal').style.display = 'none';
            let dateStr = new Date().toLocaleDateString('en-GB');

            try {
                await fetch(`${FB_URL}/deleted.json`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: user.name, link: user.link, admin: admin }) });
                await fetch(`${FB_URL}/ledger.json`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: user.name, amount: 0, note: "تم حذف العضو برمجياً", admin: admin }) });
                await fetch(`${FB_URL}/users/${userId}.json`, { method: 'DELETE' });
                
                showMsg("تم الحذف", `تمت إزالة ${user.name} بنجاح!`, "var(--primary)");
                document.getElementById('delSearch').value = '';
                fetchUsers();
            } catch(e) { showMsg("خطأ", "فشل الحذف"); }
        }

        function loadUsersTable() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            let usersArray = Object.values(globalUsers).sort((a,b) => b.balance - a.balance);
            if(usersArray.length === 0) { tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;">لا يوجد أعضاء</td></tr>'; return;}
            usersArray.forEach(user => {
                tbody.innerHTML += `<tr class="user-row" onclick="openLedger('${user.name}')"><td>${user.name}</td><td style="color:var(--gold); font-weight:bold;">${user.balance}</td></tr>`;
            });
        }

        async function openLedger(userName) {
            document.getElementById('ledgerTitle').innerText = 'سجل: ' + userName;
            const tbody = document.getElementById('ledgerBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">جاري جلب السجل...</td></tr>';
            document.getElementById('ledgerModal').style.display = 'flex';

            try {
                const res = await fetch(`${FB_URL}/ledger.json`);
                const data = await res.json();
                tbody.innerHTML = '';
                if(!data) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد سجل لهذا العضو.</td></tr>'; return; }
                
                const history = Object.values(data).filter(item => item.name === userName);
                if(history.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد سجل لهذا العضو.</td></tr>'; return; }
                
                history.reverse().forEach(item => {
                    let amountStr = Number(item.amount);
                    let color = amountStr > 0 ? '#28a745' : (amountStr < 0 ? '#ff4d4d' : '#888');
                    tbody.innerHTML += `<tr>
                        <td style="color:#aaa;">${item.date}</td>
                        <td style="color:${color}; direction:ltr; font-weight:bold;">${amountStr}</td>
                        <td>${item.note}</td>
                        <td style="color:var(--gold);">${item.admin}</td>
                    </tr>`;
                });
            } catch(e) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">خطأ في جلب السجل.</td></tr>'; }
        }
    </script>
</body>
</html>
