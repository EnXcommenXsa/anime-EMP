<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>إدارة الإمبراطورية | سري</title>
    <style>
        :root { --bg: #0d0d0d; --primary: #d10000; --surface: #1a1a1a; }
        body { font-family: Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; min-width: 45%; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); }
        .form-section { background: var(--surface); padding: 20px; border-radius: 10px; display: none; border: 1px solid #333; }
        .form-section.active { display: block; }
        label { display: block; margin: 10px 0 5px; color: #aaa; font-size: 14px; }
        input, select { width: 100%; box-sizing: border-box; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; font-size: 15px; }
        input:focus, select:focus { border-color: var(--primary); outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }
        .submit-btn:active { opacity: 0.8; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>لوحة تحكم اللجنة</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('add-member')">إضافة عضو</button>
        <button class="tab-btn" onclick="showTab('delete-member')">إزالة عضو</button>
        <button class="tab-btn" onclick="showTab('add-coins')">إضافة عملات</button>
        <button class="tab-btn" onclick="showTab('deduct-coins')">خصم عملات</button>
    </div>

    <!-- كلمة المرور عامة لكل النماذج -->
    <label>الرمز السري (مطلوب دائماً):</label>
    <input type="password" id="globalPass" placeholder="أدخل الرمز السري هنا...">
    <hr style="border-color:#333; margin: 15px 0;">

    <!-- 1. نموذج إضافة عضو -->
    <div id="add-member" class="form-section active">
        <label>رابط الحساب:</label>
        <input type="text" id="addLink" placeholder="رابط العضو...">
        <label>لقب العضو:</label>
        <input type="text" id="addName" placeholder="اللقب...">
        <button class="submit-btn" style="background:#28a745;" onclick="submitForm('add_member')">حفظ العضو الجديد</button>
    </div>

    <!-- 2. نموذج إزالة عضو -->
    <div id="delete-member" class="form-section">
        <label>ابحث عن العضو (الاسم أو الرابط):</label>
        <input type="text" id="delIdentifier" placeholder="اكتب اللقب أو ألصق الرابط...">
        <button class="submit-btn" style="background:#444; border:1px solid #777;" onclick="submitForm('delete_member')">إزالة ونقل لسجل المحذوفين ⚠️</button>
    </div>

    <!-- 3. نموذج إضافة عملات -->
    <div id="add-coins" class="form-section">
        <label>ابحث عن العضو (الاسم أو الرابط):</label>
        <input type="text" id="addCoinIdentifier" placeholder="اللقب أو الرابط...">
        <label>عدد العملات المضافة:</label>
        <input type="number" id="addCoinAmount" placeholder="العدد (مثال: 50)...">
        <label>سبب الإضافة:</label>
        <input type="text" id="addCoinReason" placeholder="مثال: مدونة بالرئيسية، مسابقة...">
        <label>اسم المشرف/اللجنة (المسؤول عن الإجراء):</label>
        <input type="text" id="addCoinAdmin" placeholder="اكتب اسمك...">
        <button class="submit-btn" onclick="submitForm('add_coins')">+ إضافة الرصيد للعضو</button>
    </div>

    <!-- 4. نموذج خصم عملات -->
    <div id="deduct-coins" class="form-section">
        <label>ابحث عن العضو (الاسم أو الرابط):</label>
        <input type="text" id="deductIdentifier" placeholder="اللقب أو الرابط...">
        <label>عدد العملات المخصومة:</label>
        <input type="number" id="deductAmount" placeholder="العدد (بدون علامة سالب)...">
        <label>نوع الخصم:</label>
        <select id="deductReason">
            <option value="شراء من المتجر">شراء من المتجر</option>
            <option value="عقوبة/مخالفة">عقوبة/مخالفة</option>
            <option value="أخذ إجازة">أخذ إجازة</option>
        </select>
        <label>صندوق الملاحظات (تفاصيل الخصم):</label>
        <input type="text" id="deductNotes" placeholder="ماذا اشترى؟ أو ما سبب المخالفة؟">
        <label>اسم المشرف/اللجنة (المسؤول عن الإجراء):</label>
        <input type="text" id="deductAdmin" placeholder="اكتب اسمك...">
        <button class="submit-btn" onclick="submitForm('deduct_coins')">- خصم الرصيد من العضو</button>
    </div>

    <div id="status"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi7NYfcZVfqdcJtJFv4rFdljG1CaAal_SZSDoQ7XDuyhHlIv4n1YLmUxugsUptRyg/exec";

        function showTab(tabId) {
            document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            document.getElementById('status').innerText = "";
        }

        async function submitForm(actionType) {
            const pass = document.getElementById('globalPass').value;
            const statusDiv = document.getElementById('status');
            
            if(!pass) { showMsg("الرجاء إدخال الرمز السري أولاً!", "red"); return; }

            let payload = { password: pass, action: actionType };

            if(actionType === 'add_member') {
                payload.identifier = document.getElementById('addLink').value;
                payload.name = document.getElementById('addName').value;
                if(!payload.identifier || !payload.name) { showMsg("أكمل بيانات العضو!", "red"); return; }
            }
            else if(actionType === 'delete_member') {
                payload.identifier = document.getElementById('delIdentifier').value;
                if(!payload.identifier) { showMsg("اكتب اسم أو رابط العضو للإزالة!", "red"); return; }
                if(!confirm("هل أنت متأكد من إزالة هذا العضو؟")) return;
            }
            else if(actionType === 'add_coins') {
                payload.identifier = document.getElementById('addCoinIdentifier').value;
                payload.amount = document.getElementById('addCoinAmount').value;
                payload.reason = document.getElementById('addCoinReason').value;
                payload.adminName = document.getElementById('addCoinAdmin').value;
                if(!payload.identifier || !payload.amount) { showMsg("البيانات ناقصة!", "red"); return; }
            }
            else if(actionType === 'deduct_coins') {
                payload.identifier = document.getElementById('deductIdentifier').value;
                payload.amount = document.getElementById('deductAmount').value;
                payload.reason = document.getElementById('deductReason').value;
                payload.notes = document.getElementById('deductNotes').value;
                payload.adminName = document.getElementById('deductAdmin').value;
                if(!payload.identifier || !payload.amount) { showMsg("البيانات ناقصة!", "red"); return; }
            }

            showMsg("جاري إرسال الطلب...", "yellow");

            try {
                const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await response.json();
                
                if(result.success) {
                    showMsg(result.message, "#28a745");
                    // مسح الحقول بعد النجاح (اختياري)
                    document.querySelectorAll('input[type="text"]:not(#globalPass), input[type="number"]').forEach(inpt => inpt.value = '');
                } else {
                    showMsg(result.error, "red");
                }
            } catch (error) {
                showMsg("خطأ في الاتصال بالإنترنت.", "red");
            }
        }

        function showMsg(msg, color) {
            const statusDiv = document.getElementById('status');
            statusDiv.style.color = color;
            statusDiv.innerText = msg;
        }
    </script>
</body>
</html>
