<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة الإمبراطورية | سري</title>
    <style>
        :root { 
            --bg-color: #050505; 
            --surface-color: #111; 
            --primary-color: #e60000; 
            --text-color: #f2f2f2; 
            --glow: 0 0 10px rgba(230, 0, 0, 0.5);
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; padding-bottom: 80px; background-image: radial-gradient(circle at 50% 0%, #2a0000 0%, #050505 60%); background-attachment: fixed; }
        
        .header { background: #0a0a0a; padding: 20px; text-align: center; border-bottom: 1px solid var(--primary-color); box-shadow: var(--glow); position: sticky; top: 0; z-index: 10; }
        .header h2 { margin: 0; color: #fff; font-size: 22px; letter-spacing: 1px; text-shadow: var(--glow); }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .form-section { display: none; background: rgba(17, 17, 17, 0.9); padding: 20px; border-radius: 12px; border: 1px solid #330000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: fadeIn 0.3s ease; backdrop-filter: blur(5px); }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin: 15px 0 8px; color: #bbb; font-size: 14px; font-weight: bold; }
        input { width: 100%; box-sizing: border-box; padding: 14px; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 8px; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary-color); box-shadow: inset 0 0 8px rgba(230,0,0,0.3); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .search-container { position: relative; }
        .search-results { position: absolute; width: 100%; background: #0a0a0a; border: 1px solid var(--primary-color); border-top: none; border-radius: 0 0 8px 8px; max-height: 150px; overflow-y: auto; z-index: 20; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .search-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; color: white; font-size: 14px; transition: 0.2s; }
        .search-item:hover { background: #222; color: var(--primary-color); }

        .submit-btn { width: 100%; padding: 15px; margin-top: 25px; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-red { background: linear-gradient(45deg, #8b0000, #d10000); box-shadow: 0 4px 15px rgba(209, 0, 0, 0.4); }
        .btn-green { background: linear-gradient(45deg, #1e7e34, #28a745); }
        .btn-dark { background: linear-gradient(45deg, #222, #444); border: 1px solid #555; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; border-top: 1px solid #333; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px 5px; text-align: center; color: #888; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: white; background: rgba(230, 0, 0, 0.15); border-top: 2px solid var(--primary-color); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-box { background: #111; width: 85%; max-width: 400px; padding: 25px; border-radius: 15px; border: 1px solid var(--primary-color); text-align: center; box-shadow: var(--glow); animation: popIn 0.3s; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-box h3 { margin-top: 0; color: #fff; text-shadow: var(--glow); }
        .modal-box p { color: #ccc; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 0 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #0a0a0a; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #222; }
        th { background: var(--primary-color); color: white; }
        .user-row { cursor: pointer; transition: 0.2s; }
        .user-row:hover { background: #1a1a1a; }
        .ledger-modal .modal-box { max-width: 500px; width: 95%; padding: 15px; text-align: right; }
        .ledger-table { font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>إدارة الإمبراطورية</h2>
    </div>

    <div class="container">
        
        <!-- حقول التوثيق (تختفي في صفحة القائمة) -->
        <div id="authFields" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <label>الرمز السري:</label>
                <input type="password" id="adminPass" placeholder="الرمز...">
            </div>
            <div style="flex: 1;">
                <label>الاسم (للسجل):</label>
                <input type="text" id="adminName" placeholder="الاسم...">
            </div>
        </div>

        <!-- 1. إضافة عضو -->
        <div id="tab-add" class="form-section active">
            <h3 style="color:#fff; text-align:center; margin-top:0;">إضافة عضو جديد</h3>
            <label>رابط الحساب:</label>
            <input type="text" id="newLink" placeholder="ألصق رابط العضو..." autocomplete="off">
            <label>لقب العضو:</label>
            <input type="text" id="newName" placeholder="اكتب اللقب..." autocomplete="off">
            <button class="submit-btn btn-green" onclick="addUser()">حفظ العضو</button>
        </div>

        <!-- 2. إدارة العملات (مدمجة) -->
        <div id="tab-coins" class="form-section">
            <h3 style="color:#fff; text-align:center; margin-top:0;">إدارة العملات</h3>
            
            <div class="search-container">
                <label>ابحث عن العضو:</label>
                <input type="text" id="coinSearch" placeholder="اكتب اللقب..." autocomplete="off" oninput="handleSearch(this.value, 'coinResults', 'coin')">
                <div id="coinResults" class="search-results"></div>
            </div>
            <input type="hidden" id="coinUserId">

            <label>العدد (بدون إشارة):</label>
            <input type="number" id="coinAmount" placeholder="مثال: 50">
            
            <label>السبب والتفاصيل:</label>
            <input type="text" id="coinReason" placeholder="مثال: مسابقة، عقوبة، شراء...">
            
            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button class="submit-btn btn-green" style="margin-top:0;" onclick="processCoins('add')">إضافة الرصيد</button>
                <button class="submit-btn btn-red" style="margin-top:0;" onclick="processCoins('deduct')">خصم الرصيد</button>
            </div>
        </div>

        <!-- 3. إزالة عضو -->
        <div id="tab-del" class="form-section">
            <h3 style="color:#fff; text-align:center; margin-top:0;">إزالة عضو</h3>
            <div class="search-container">
                <label>ابحث عن العضو للحذف:</label>
                <input type="text" id="delSearch" placeholder="اكتب اللقب..." autocomplete="off" oninput="handleSearch(this.value, 'delResults', 'del')">
                <div id="delResults" class="search-results"></div>
            </div>
            <input type="hidden" id="delUserId">
            <button class="submit-btn btn-dark" onclick="confirmDelete()">نقل لسجل المحذوفين</button>
        </div>

        <!-- 4. قائمة الأعضاء -->
        <div id="tab-list" class="form-section">
            <h3 style="color:#fff; text-align:center; margin-top:0;">جميع الأعضاء</h3>
            <p style="text-align:center; color:#888; font-size:12px;">انقر على أي عضو لفتح السجل الخاص به</p>
            <div style="max-height: 400px; overflow-y: auto;">
                <table>
                    <thead><tr><th>اللقب</th><th>الرصيد</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tab-add', this)">إضافة</div>
        <div class="nav-item" onclick="switchTab('tab-coins', this)">العملات</div>
        <div class="nav-item" onclick="switchTab('tab-del', this)">حذف</div>
        <div class="nav-item" onclick="switchTab('tab-list', this)">القائمة</div>
    </div>

    <!-- النوافذ المنبثقة -->
    <div id="msgModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="msgTitle">رسالة</h3>
            <p id="msgText">نص الرسالة</p>
            <button class="modal-btn btn-red" onclick="document.getElementById('msgModal').style.display='none'">حسناً</button>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box">
            <h3>تأكيد الحذف</h3>
            <p id="confirmText">هل أنت متأكد؟</p>
            <button class="modal-btn btn-dark" onclick="document.getElementById('confirmModal').style.display='none'">إلغاء</button>
            <button class="modal-btn btn-red" onclick="executeDelete()">تأكيد الحذف</button>
        </div>
    </div>

    <div id="ledgerModal" class="modal-overlay ledger-modal">
        <div class="modal-box">
            <h3 id="ledgerTitle" style="color:#fff; text-align:center; margin-top:0;">سجل العضو</h3>
            <div style="max-height: 300px; overflow-y: auto;">
                <table class="ledger-table">
                    <thead><tr><th>التاريخ</th><th>المبلغ</th><th>السبب</th><th>المسؤول</th></tr></thead>
                    <tbody id="ledgerBody"></tbody>
                </table>
            </div>
            <button class="submit-btn btn-dark" style="margin-top:15px; padding:10px;" onclick="document.getElementById('ledgerModal').style.display='none'">إغلاق</button>
        </div>
    </div>

    <script>
        const FB_URL = "https://anime-empire-55fc0-default-rtdb.firebaseio.com";
        let globalUsers = {}; 

        function showMsg(title, text) {
            document.getElementById('msgTitle').innerText = title;
            document.getElementById('msgText').innerText = text;
            document.getElementById('msgModal').style.display = 'flex';
        }

        async function fetchUsers() {
            try {
                const res = await fetch(`${FB_URL}/users.json`);
                const data = await res.json();
                globalUsers = {};
                
                // فلتر ذكي لتخطي البيانات التالفة أو undefined
                if (data) {
                    Object.entries(data).forEach(([id, user]) => {
                        if (user && user.name) {
                            globalUsers[id] = {
                                link: user.link || '',
                                name: user.name,
                                balance: Number(user.balance) || 0
                            };
                        }
                    });
                }
            } catch (e) { showMsg("خطأ", "فشل الاتصال بقاعدة البيانات"); }
        }
        
        window.onload = fetchUsers;

        function switchTab(tabId, el) {
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            
            // إخفاء حقول الإدارة في صفحة القائمة
            if(tabId === 'tab-list') {
                document.getElementById('authFields').style.display = 'none';
                loadUsersTable();
            } else {
                document.getElementById('authFields').style.display = 'flex';
            }
            
            fetchUsers(); 
        }

        function handleSearch(query, resultBoxId, type) {
            const box = document.getElementById(resultBoxId);
            box.innerHTML = '';
            if(query.length < 2) { box.style.display = 'none'; return; }
            
            let matches = Object.entries(globalUsers).filter(([id, user]) => 
                user.name.toLowerCase().includes(query.toLowerCase()) || 
                user.link.toLowerCase().includes(query.toLowerCase())
            );

            if(matches.length === 0) { box.style.display = 'none'; return; }

            matches.forEach(([id, user]) => {
                let div = document.createElement('div');
                div.className = 'search-item';
                div.innerText = `${user.name} (${user.balance})`;
                div.onclick = () => {
                    document.getElementById(type + 'Search').value = user.name;
                    document.getElementById(type + 'UserId').value = id;
                    box.style.display = 'none';
                };
                box.appendChild(div);
            });
            box.style.display = 'block';
        }

        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            const name = document.getElementById('adminName').value;
            if(pass !== "123" || !name) { showMsg("تنبيه", "يجب كتابة الرمز السري (123) والاسم!"); return null; }
            return name;
        }

        async function addUser() {
            const admin = checkAdmin(); if(!admin) return;
            const link = document.getElementById('newLink').value.trim();
            const name = document.getElementById('newName').value.trim();
            if(!link || !name) return showMsg("تنبيه", "أكمل جميع الحقول!");

            let exists = Object.values(globalUsers).find(u => u.link === link || u.name === name);
            if(exists) return showMsg("مرفوض", "هذا العضو أو الرابط مسجل مسبقاً!");

            try {
                await fetch(`${FB_URL}/users.json`, { method: 'POST', body: JSON.stringify({ link: link, name: name, balance: 0 }) });
                let dateStr = new Date().toLocaleDateString('en-GB');
                await fetch(`${FB_URL}/ledger.json`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: name, amount: 0, note: "تسجيل عضو جديد", admin: admin }) });
                showMsg("نجاح", `تمت إضافة العضو ${name} بنجاح!`);
                document.getElementById('newLink').value = ''; document.getElementById('newName').value = '';
                fetchUsers();
            } catch(e) { showMsg("خطأ", "فشل الحفظ"); }
        }

        async function processCoins(type) {
            const admin = checkAdmin(); if(!admin) return;
            const userId = document.getElementById('coinUserId').value;
            const amountStr = document.getElementById('coinAmount').value;
            const reason = document.getElementById('coinReason').value.trim();
            
            if(!userId || !globalUsers[userId]) return showMsg("تنبيه", "الرجاء اختيار عضو من قائمة البحث!");
            if(!amountStr || !reason) return showMsg("تنبيه", "جميع الحقول إجبارية!");
            
            let amount = Number(amountStr);
            if(amount === 0) return showMsg("تنبيه", "لا يمكن إضافة أو خصم 0 عملات!");
            
            amount = Math.abs(amount); 
            if(type === 'deduct') amount = -amount; 

            let newBalance = Number(globalUsers[userId].balance) + amount;
            let dateStr = new Date().toLocaleDateString('en-GB');

            try {
                await fetch(`${FB_URL}/users/${userId}.json`, { method: 'PATCH', body: JSON.stringify({ balance: newBalance }) });
                await fetch(`${FB_URL}/ledger.json`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: globalUsers[userId].name, amount: amount, note: reason, admin: admin }) });
                
                showMsg("نجاح", `تم التحديث! الرصيد الجديد: ${newBalance}`);
                document.getElementById('coinSearch').value = ''; document.getElementById('coinAmount').value = ''; document.getElementById('coinReason').value = '';
                fetchUsers();
            } catch(e) { showMsg("خطأ", "فشل التحديث"); }
        }

        function confirmDelete() {
            const admin = checkAdmin(); if(!admin) return;
            const userId = document.getElementById('delUserId').value;
            if(!userId || !globalUsers[userId]) return showMsg("تنبيه", "الرجاء اختيار العضو من البحث أولاً!");

            const user = globalUsers[userId];
            document.getElementById('confirmText').innerText = `أنت على وشك حذف العضو [ ${user.name} ]\nهذا العضو يمتلك [ ${user.balance} ] عملة.\n\nهل أنت متأكد من نقله لسجل المحذوفين؟`;
            document.getElementById('confirmModal').style.display = 'flex';
        }

        async function executeDelete() {
            const userId = document.getElementById('delUserId').value;
            const admin = document.getElementById('adminName').value;
            const user = globalUsers[userId];
            document.getElementById('confirmModal').style.display = 'none';
            let dateStr = new Date().toLocaleDateString('en-GB');

            try {
                await fetch(`${FB_URL}/deleted.json`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: user.name, link: user.link, admin: admin }) });
                await fetch(`${FB_URL}/ledger.json`, { method: 'POST', body: JSON.stringify({ date: dateStr, name: user.name, amount: 0, note: "تم حذف العضو برمجياً", admin: admin }) });
                await fetch(`${FB_URL}/users/${userId}.json`, { method: 'DELETE' });
                
                showMsg("تم الحذف", `تمت إزالة ${user.name} بنجاح!`);
                document.getElementById('delSearch').value = '';
                fetchUsers();
                if(document.getElementById('tab-list').classList.contains('active')) loadUsersTable();
            } catch(e) { showMsg("خطأ", "فشل الحذف"); }
        }

        function loadUsersTable() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            let usersArray = Object.values(globalUsers).sort((a,b) => b.balance - a.balance);
            if(usersArray.length === 0) { tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;">لا يوجد أعضاء</td></tr>'; return;}
            usersArray.forEach(user => {
                tbody.innerHTML += `<tr class="user-row" onclick="openLedger('${user.name}')"><td>${user.name}</td><td style="color:#fff; font-weight:bold;">${user.balance}</td></tr>`;
            });
        }

        async function openLedger(userName) {
            document.getElementById('ledgerTitle').innerText = 'سجل: ' + userName;
            const tbody = document.getElementById('ledgerBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">جاري جلب السجل...</td></tr>';
            document.getElementById('ledgerModal').style.display = 'flex';

            try {
                const res = await fetch(`${FB_URL}/ledger.json`);
                const data = await res.json();
                tbody.innerHTML = '';
                if(!data) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد سجل لهذا العضو.</td></tr>'; return; }
                
                const history = Object.values(data).filter(item => item.name === userName);
                if(history.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد سجل لهذا العضو.</td></tr>'; return; }
                
                history.reverse().forEach(item => {
                    let amountStr = Number(item.amount);
                    let color = amountStr > 0 ? '#28a745' : (amountStr < 0 ? '#e60000' : '#888');
                    tbody.innerHTML += `<tr>
                        <td style="color:#aaa;">${item.date}</td>
                        <td style="color:${color}; direction:ltr; font-weight:bold;">${amountStr}</td>
                        <td>${item.note}</td>
                        <td style="color:#bbb;">${item.admin}</td>
                    </tr>`;
                });
            } catch(e) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">خطأ في جلب السجل.</td></tr>'; }
        }
    </script>
</body>
</html>
