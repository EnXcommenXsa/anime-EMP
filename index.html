<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>امبراطورية الأنمي | بنك العملات</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --primary-color: #d10000;
            --text-color: #f2f2f2;
            --border-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(209, 0, 0, 0.5);
            font-size: 2.5em;
            margin-bottom: 5px;
        }
        p.subtitle { color: #888; margin-bottom: 30px; }
        .container {
            max-width: 800px;
            margin: auto;
            background: var(--surface-color);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            margin: 10px 0 20px 0;
            background: #222;
            border: 1px solid var(--primary-color);
            color: white;
            border-radius: 5px;
            outline: none;
            font-size: 16px;
        }
        input[type="text"]:focus { box-shadow: 0 0 8px var(--primary-color); }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }
        th { background-color: var(--primary-color); color: white; }
        tr:hover { background-color: #2a2a2a; }
        .link-btn {
            color: #ff4d4d;
            text-decoration: none;
            font-weight: bold;
        }
        .link-btn:hover { text-decoration: underline; }
        .loading { color: var(--primary-color); font-size: 1.2em; margin: 20px; display: none; }
    </style>
</head>
<body>

    <h1>امبراطورية الأنمي</h1>
    <p class="subtitle">بنك العملات الرسمي والمكافآت</p>

    <div class="container">
        <h2>ابحث عن رصيدك</h2>
        <input type="text" id="searchInput" placeholder="اكتب لقبك هنا للبحث..." onkeyup="filterTable()">
        
        <div id="loading" class="loading">جاري جلب بيانات الإمبراطورية...</div>

        <table id="usersTable">
            <thead>
                <tr>
                    <th>المركز</th>
                    <th>اللقب</th>
                    <th>الرصيد</th>
                    <th>الحساب</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- سيتم إدراج البيانات هنا عبر الجافاسكربت -->
            </tbody>
        </table>
    </div>

    <script>
        // الرابط السري لجلب البيانات
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi7NYfcZVfqdcJtJFv4rFdljG1CaAal_SZSDoQ7XDuyhHlIv4n1YLmUxugsUptRyg/exec";
        
        let usersData = [];

        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch(SCRIPT_URL);
                usersData = await response.json();
                
                // ترتيب الأعضاء حسب الرصيد (من الأعلى للأقل)
                usersData.sort((a, b) => b.balance - a.balance);
                
                renderTable(usersData);
            } catch (error) {
                alert("حدث خطأ في جلب البيانات، يرجى المحاولة لاحقاً.");
            }
            document.getElementById('loading').style.display = 'none';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach((user, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${user.name}</strong></td>
                    <td style="color: #ff4d4d; font-weight: bold;">${user.balance}</td>
                    <td><a href="${user.link}" target="_blank" class="link-btn">زيارة</a></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = usersData.filter(user => 
                (user.name && user.name.toLowerCase().includes(query)) || 
                (user.link && user.link.toLowerCase().includes(query))
            );
            renderTable(filteredData);
        }

        // تشغيل الدالة عند فتح الصفحة
        window.onload = loadData;
    </script>
</body>
</html>
