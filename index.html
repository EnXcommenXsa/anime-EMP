<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>امبراطورية الأنمي | الخزينة</title>
    <style>
        :root { 
            --bg-dark: #19171b; 
            --surface: #252628; 
            --primary: #5d0018; 
            --gold: #d29f22; 
            --text: #f2f2f2; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-dark); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        
        h1 { color: var(--gold); font-size: 2.5em; margin-bottom: 5px; text-shadow: 0 4px 10px rgba(210, 159, 34, 0.3); }
        p.subtitle { color: #888; margin-bottom: 30px; font-size: 1.1em; }
        
        .container { max-width: 700px; margin: auto; background: var(--surface); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); }
        
        input[type="text"] { width: 85%; padding: 15px; margin-bottom: 25px; background: var(--bg-dark); border: 1px solid var(--primary); color: white; border-radius: 8px; outline: none; font-size: 16px; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        input[type="text"]:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(210, 159, 34, 0.3); }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; background-color: var(--primary); color: var(--gold); text-transform: uppercase; }
        th:first-child { border-radius: 0 8px 8px 0; }
        th:last-child { border-radius: 8px 0 0 8px; }
        
        td { padding: 15px; background: var(--bg-dark); font-size: 1.1em; border-top: 1px solid #333; border-bottom: 1px solid #333;}
        td:first-child { border-radius: 0 8px 8px 0; font-weight: bold; color: #888; border-right: 1px solid #333;}
        td:last-child { border-radius: 8px 0 0 8px; color: var(--gold); font-weight: bold; border-left: 1px solid #333;}
        tr:hover td { background-color: #1f1d22; transform: scale(1.01); transition: 0.2s; border-color: var(--gold); }
        
        .loading { color: var(--gold); font-size: 1.2em; margin: 20px; display: none; }
        .rank-1 { color: #fff !important; text-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

    <h1>امبراطورية الأنمي</h1>
    <p class="subtitle">♛ الخزينة الإمبراطورية الرسمية ♛</p>

    <div class="container">
        <!-- أضفنا autocomplete="off" لتعطيل تاريخ المتصفح المزعج -->
        <input type="text" id="searchInput" placeholder="ابحث باسم اللقب أو رابط الحساب..." onkeyup="filterTable()" autocomplete="off">
        <div id="loading" class="loading">جاري فتح أبواب الخزينة... ⏳</div>
        <table>
            <thead>
                <tr><th>المركز</th><th>اللقب</th><th>العملات</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        // رابط قاعدة بياناتك الجديدة
        const FB_URL = "https://anime-empire-55fc0-default-rtdb.firebaseio.com";
        let usersData = [];

        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            try {
                const res = await fetch(`${FB_URL}/users.json`);
                const data = await res.json();
                
                if(!data) {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="3" style="text-align: center; color: #888;">لا يوجد أعضاء في الخزينة بعد</td></tr>';
                } else {
                    // تحويل بيانات Firebase إلى مصفوفة للترتيب
                    usersData = Object.values(data);
                    usersData.sort((a, b) => b.balance - a.balance);
                    renderTable(usersData);
                }
            } catch (error) {
                document.getElementById('loading').innerHTML = '❌ عذراً، حدث خطأ في الاتصال بخوادم الإمبراطورية.';
            }
            document.getElementById('loading').style.display = 'none';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach((user, index) => {
                const rankClass = index === 0 ? 'rank-1' : '';
                const rankText = index === 0 ? '👑 1' : index + 1;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="${rankClass}">${rankText}</td>
                    <td style="color: #fff;">${user.name}</td>
                    <td dir="ltr">${user.balance}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = usersData.filter(user => 
                (user.name && user.name.toLowerCase().includes(query)) || 
                (user.link && user.link.toLowerCase().includes(query))
            );
            renderTable(filteredData);
        }
        
        window.onload = loadData;
    </script>
</body>
</html>
